name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true
    
jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (all)
        run: pnpm -r run build

      - name: Type check (all)
        run: pnpm -r run typecheck

      - name: Lint (all)
        run: pnpm run lint

      - name: Check bundle size (all)
        run: pnpm -r run size

  trackkit-core:
    name: Build Trackkit Core
    runs-on: ubuntu-latest
    needs: repo-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (all)
        run: pnpm -r run build

      - name: Inject @default literals into .d.ts (uses sync-doc-defaults)
        run: pnpm --filter trackkit run defaults:inject

      - name: Assert `.d.ts` reflect real runtime values
        run: pnpm --filter trackkit run defaults:assert

      - name: Run tests and emit coverage
        run: pnpm --filter trackkit run test:coverage

      - name: Check test coverage
        run: pnpm --filter trackkit run coverage:check

      - name: Dead code gate (coverage + Knip)
        run: pnpm --filter trackkit run deadcode:gate

      - name: Upload deadcode report
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: deadcode-report
          path: packages/trackkit/deadcode-report.md
          if-no-files-found: ignore

  trackkit-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: trackkit-core # Run after build/unit tests pass (save resources)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Trackkit SDK
        run: pnpm --filter trackkit run build

      - name: Install Playwright Browsers
        working-directory: packages/trackkit
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm --filter trackkit run test:e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/trackkit/playwright-report/
          retention-days: 30
